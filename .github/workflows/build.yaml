name: Build and Push Caddy Image

on:
  push:
    branches: [main]
    paths:
      - docker/**
      - .github/workflows/build.yaml
  pull_request:
    paths:
      - docker/**
  workflow_dispatch:
    inputs:
      push:
        description: Push image to registry
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/brdelphus/caddy-custom

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Caddy version from Dockerfile
        id: caddy_version
        run: |
          VERSION=$(grep '^FROM caddy:' docker/Dockerfile | head -1 | sed 's/FROM caddy:\(.*\)-builder/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.caddy_version.outputs.version }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
