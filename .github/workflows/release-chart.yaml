name: Release Helm Chart

on:
  push:
    branches: [main]
    paths:
      - helm/**
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push to gh-pages branch, create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # chart-releaser needs full history to detect changes

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update chart dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency update helm/

      - name: Generate release notes
        run: |
          CHART_NAME=$(grep '^name:' helm/Chart.yaml | awk '{print $2}')
          CHART_VERSION=$(grep '^version:' helm/Chart.yaml | awk '{print $2}')
          CURRENT_TAG="${CHART_NAME}-${CHART_VERSION}"

          PREV_TAG=$(git tag -l "${CHART_NAME}-*" --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1)

          {
            echo "## What's Changed"
            echo ""

            RANGE="${PREV_TAG:+${PREV_TAG}..HEAD}"
            [ -z "$RANGE" ] && RANGE="HEAD"

            FEATURES=$(git log $RANGE --pretty=format:"%s (%h)" -- helm/ | grep -iE "^feat" || true)
            FIXES=$(git log $RANGE --pretty=format:"%s (%h)" -- helm/ | grep -iE "^fix" || true)
            DOCS=$(git log $RANGE --pretty=format:"%s (%h)" -- helm/ | grep -iE "^docs" || true)
            OTHER=$(git log $RANGE --pretty=format:"%s (%h)" -- helm/ | grep -ivE "^(feat|fix|docs)" || true)

            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES" | sed 's/^/- /'
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES" | sed 's/^/- /'
              echo ""
            fi
            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo "$DOCS" | sed 's/^/- /'
              echo ""
            fi
            if [ -n "$OTHER" ]; then
              echo "### Other"
              echo "$OTHER" | sed 's/^/- /'
              echo ""
            fi

            if [ -n "$PREV_TAG" ]; then
              echo "**Full diff:** [\`${PREV_TAG}...${CURRENT_TAG}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG})"
            fi
          } > /tmp/release-notes.md

          cat /tmp/release-notes.md
          echo "CHART_TAG=${CURRENT_TAG}" >> "$GITHUB_ENV"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: .
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach release notes
        run: gh release edit "$CHART_TAG" --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
