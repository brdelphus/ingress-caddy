name: Release Helm Chart

on:
  push:
    branches: [main]
    paths:
      - helm/**
      - VERSION
      - CHANGELOG.md
  workflow_dispatch:

concurrency:
  group: helm-release
  cancel-in-progress: false   # queue, don't cancel — every release must complete

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push to gh-pages branch, create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # chart-releaser needs full history to detect changes

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update chart dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency update helm/

      - name: Extract release notes from CHANGELOG.md
        run: |
          CHART_NAME=$(grep '^name:' helm/Chart.yaml | awk '{print $2}')
          CHART_VERSION=$(grep '^version:' helm/Chart.yaml | awk '{print $2}')
          APP_VERSION=$(grep '^appVersion:' helm/Chart.yaml | awk '{print $2}' | tr -d '"')
          CURRENT_TAG="${CHART_NAME}-${CHART_VERSION}"

          # Extract the section for the current appVersion from CHANGELOG.md
          awk "/^## \[${APP_VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
            | sed '/^---$/d' \
            | sed '/^$/N;/^\n$/d' \
            > /tmp/release-notes.md

          # Fallback if version not found in changelog
          if [ ! -s /tmp/release-notes.md ]; then
            echo "No changelog entry found for ${APP_VERSION}." > /tmp/release-notes.md
          fi

          PREV_TAG=$(git tag -l "${CHART_NAME}-*" --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            echo "" >> /tmp/release-notes.md
            echo "**Full diff:** [\`${PREV_TAG}...${CURRENT_TAG}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG})" >> /tmp/release-notes.md
          fi

          cat /tmp/release-notes.md
          echo "CHART_TAG=${CURRENT_TAG}" >> "$GITHUB_ENV"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: .
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach release notes
        run: gh release edit "$CHART_TAG" --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
