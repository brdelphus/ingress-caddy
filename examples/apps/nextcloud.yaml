# ── Nextcloud ─────────────────────────────────────────────────────────────────
# Helm chart: https://github.com/nextcloud/helm
#
#   helm repo add nextcloud https://nextcloud.github.io/helm
#   helm install nextcloud nextcloud/nextcloud -n nextcloud --create-namespace \
#     -f nextcloud.yaml

nextcloud:
  host: nextcloud.example.com

ingress:
  enabled: true
  className: caddy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    caddy.ingress/ssl-redirect: "true"
    # Nextcloud .well-known redirects
    caddy.ingress/permanent-redirect: ""   # leave blank — handled per-path below
    # Large file uploads
    caddy.ingress/proxy-body-size: "10G"
    caddy.ingress/proxy-read-timeout: "3600"
    caddy.ingress/proxy-send-timeout: "3600"
  tls:
    - hosts:
        - nextcloud.example.com
      secretName: nextcloud-tls   # cert-manager creates this Secret in the Ingress namespace

# Nextcloud needs these .well-known paths redirected to the correct locations.
# Add them as additional Ingress resources or via the chart's built-in paths:
nginx:
  enabled: false   # disable the bundled nginx — Caddy is the ingress

resources:
  requests:
    memory: 512Mi
    cpu: 500m
