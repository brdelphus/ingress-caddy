# ── Vaultwarden (Bitwarden-compatible) ────────────────────────────────────────
# Helm chart: https://github.com/guerzon/vaultwarden
#
#   helm repo add vaultwarden https://guerzon.github.io/vaultwarden
#   helm install vaultwarden vaultwarden/vaultwarden -n vaultwarden --create-namespace \
#     -f vaultwarden.yaml

domain: "https://vault.example.com"

ingress:
  enabled: true
  className: caddy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    caddy.ingress/ssl-redirect: "true"
    # WebSocket support for live sync
    caddy.ingress/proxy-http-version: "1.1"
  nginxIngressAnnotations: false
  hostname: vault.example.com
  tls: true
  tlsSecret: vaultwarden-tls   # cert-manager creates this Secret in namespace vaultwarden
