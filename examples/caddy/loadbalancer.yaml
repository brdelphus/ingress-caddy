# ── Cloud / MetalLB — Deployment + LoadBalancer ───────────────────────────────
# Traffic comes through a LoadBalancer (MetalLB, AWS NLB, GCE, etc.).
# externalTrafficPolicy: Local preserves the real client IP and avoids
# an extra kube-proxy hop. Disable hostPorts to avoid conflicts.
#
# Usage:
#   helm install caddy caddy-custom/caddy -n caddy --create-namespace -f loadbalancer.yaml

k8sIngress:
  enabled: true
  ingressClass: caddy-custom

workloadType: Deployment
replicaCount: 2

hostPorts:
  enabled: false

service:
  enabled: true
  type: LoadBalancer
  externalTrafficPolicy: Local
  annotations: {}
  # MetalLB — uncomment and set your address pool:
  # annotations:
  #   metallb.universe.tf/address-pool: production
  #
  # AWS NLB:
  # annotations:
  #   service.beta.kubernetes.io/aws-load-balancer-type: nlb
  #
  # GCE internal LB:
  # annotations:
  #   cloud.google.com/load-balancer-type: Internal

# ── TLS — choose one ──────────────────────────────────────────────────────────

# Option A: cert-manager CSI
tls:
  certManagerCSI:
    enabled: true
    issuerName: letsencrypt-prod
    issuerKind: ClusterIssuer

reloader:
  enabled: true

# Option B: CertMagic built-in ACME
# For multi-replica Deployments use redis storage so all pods share cert state.
# tls:
#   certManagerCSI:
#     enabled: false
#   acme:
#     enabled: true
#     email: admin@example.com
#     challenge: http
#     storage: redis   # shared across replicas via bundled Redis
#
# redis:
#   enabled: true
#   architecture: standalone
#   auth:
#     enabled: false
#   master:
#     persistence:
#       enabled: true
#       size: 1Gi

# ── Real IP ───────────────────────────────────────────────────────────────────

realIP:
  trustedProxies:
    - 10.42.0.0/16
    - 127.0.0.1/32
