# ── Cloud / MetalLB — Deployment + LoadBalancer ───────────────────────────────
# Traffic comes through a LoadBalancer (MetalLB, AWS NLB, GCE, etc.).
# externalTrafficPolicy: Local preserves the real client IP and avoids
# an extra kube-proxy hop. Disable hostPorts to avoid conflicts.
#
# TLS is configured per Ingress via spec.tls — see cert-manager.yaml for how to
# provision certificates, or certmagic.yaml for CertMagic-based issuance.
#
# Usage:
#   helm install caddy ingress-caddy/caddy -n caddy --create-namespace -f loadbalancer.yaml

k8sIngress:
  ingressClass: caddy

workloadType: Deployment
replicaCount: 2

hostPorts:
  enabled: false

service:
  enabled: true
  type: LoadBalancer
  externalTrafficPolicy: Local
  annotations: {}
  # MetalLB — uncomment and set your address pool:
  # annotations:
  #   metallb.universe.tf/address-pool: production
  #
  # AWS NLB:
  # annotations:
  #   service.beta.kubernetes.io/aws-load-balancer-type: nlb
  #
  # GCE internal LB:
  # annotations:
  #   cloud.google.com/load-balancer-type: Internal

# ── Config hot-reload ─────────────────────────────────────────────────────────
# Built-in — no Stakater Reloader needed. Watches the Caddyfile ConfigMap and
# calls POST /load on Caddy's admin API when it changes. Zero pod restarts.

configReloader:
  enabled: true

# ── Redis (recommended for multi-replica) ─────────────────────────────────────
# Persists the Ingress → route ID map across Caddy restarts so stale routes
# don't accumulate. With multiple replicas, all pods share the same state.
#
# redis:
#   enabled: true
#   architecture: standalone
#   auth:
#     enabled: false
#   master:
#     persistence:
#       enabled: true
#       size: 1Gi

# ── Real IP ───────────────────────────────────────────────────────────────────

realIP:
  trustedProxies:
    - 10.42.0.0/16
    - 127.0.0.1/32
