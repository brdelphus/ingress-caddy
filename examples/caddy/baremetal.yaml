# ── Bare-metal k3s — DaemonSet + hostPorts ────────────────────────────────────
# Traffic arrives directly on each node's port 80/443. No load balancer needed.
# Real client IP is preserved natively.
#
# Usage:
#   helm install caddy caddy-custom/caddy -n caddy --create-namespace -f baremetal.yaml

k8sIngress:
  enabled: true
  ingressClass: caddy-custom

workloadType: DaemonSet
hostPorts:
  enabled: true
  http: 80
  https: 443

# ── TLS — choose one ──────────────────────────────────────────────────────────

# Option A: cert-manager CSI
# Certificates are provisioned by cert-manager and mounted as files.
# Caddy detects rotation via fsnotify and reloads certs automatically — no restart needed.
# Reloader is optional: only useful if you want rolling restarts on Caddyfile/config changes.
tls:
  certManagerCSI:
    enabled: true
    issuerName: letsencrypt-prod
    issuerKind: ClusterIssuer

# reloader:
#   enabled: true   # optional — triggers restart on Helm value / ConfigMap changes

# Option B: CertMagic built-in ACME (no external dependencies)
# Caddy issues and renews certs automatically for every Ingress hostname.
# tls:
#   certManagerCSI:
#     enabled: false
#   acme:
#     enabled: true
#     email: admin@example.com
#     challenge: http          # http | tls-alpn | dns
#     storage: kubernetes      # certs stored as K8s Secrets — no PVC needed

# ── Real IP ───────────────────────────────────────────────────────────────────

realIP:
  trustedProxies:
    - 10.42.0.0/16   # k3s default pod CIDR
    - 127.0.0.1/32
