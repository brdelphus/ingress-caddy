# ── Full-featured example ─────────────────────────────────────────────────────
# All optional plugins enabled. Tune to your needs before deploying.
#
# Usage:
#   helm install caddy ingress-caddy/caddy -n caddy --create-namespace -f full.yaml

k8sIngress:
  ingressClass: caddy
  isDefaultClass: false
  # Watch all namespaces (default). Set to specific namespace for multi-tenant.
  watchNamespace: ""
  security:
    waf: true
    wafMode: DetectionOnly   # switch to On once tuned
    securityHeaders: true
    injectRealIP: true

workloadType: DaemonSet
hostPorts:
  enabled: true
  http: 80
  https: 443

# ── TLS ───────────────────────────────────────────────────────────────────────
# TLS is configured per Ingress via spec.tls. See cert-manager.yaml for the
# cert-manager Certificate + Ingress pattern, or certmagic.yaml / ondemand-tls.yaml
# for CertMagic-based issuance (no cert-manager needed).

# ── Config hot-reload ─────────────────────────────────────────────────────────
# Built-in — no Stakater Reloader needed. Watches the Caddyfile ConfigMap and
# calls POST /load on Caddy's admin API when it changes. Zero pod restarts.

configReloader:
  enabled: true

# ── Real IP ───────────────────────────────────────────────────────────────────

realIP:
  trustedProxies:
    - 10.42.0.0/16
    - 127.0.0.1/32
  strict: true
  injectXRealIP: true

# ── Security headers ──────────────────────────────────────────────────────────

securityHeaders:
  enabled: true
  hsts:
    enabled: true
    maxAge: 31536000
    includeSubDomains: true
    preload: false
  xContentTypeOptions: true
  xFrameOptions: SAMEORIGIN
  referrerPolicy: strict-origin-when-cross-origin
  removeServerHeader: true

# ── Plugins ───────────────────────────────────────────────────────────────────

plugins:
  coraza:
    enabled: true
    ruleEngine: DetectionOnly   # switch to On once tuned

  crowdsec:
    enabled: true
    lapiUrl: http://crowdsec-lapi.crowdsec.svc.cluster.local:8080
    existingSecret: crowdsec-bouncer-secret   # key: api-key
    tickerInterval: 15s

  rateLimit:
    enabled: true
    window: 1m
    maxEvents: 200
    key: "{client_ip}"

  geoip:
    enabled: true
    dbPath: /data/geoip/GeoLite2-Country.mmdb
    deniedCountries: []   # e.g. ["CN", "RU", "KP", "IR"]
    updater:
      enabled: true
      existingSecret: maxmind-secret   # keys: account-id, license-key

  defender:
    enabled: true
    action: block   # block | tarpit | garbage

  # ── Built-in Authentication (caddy-security) ────────────────────────────────
  # Replaces Authelia/OAuth2-proxy for simple SSO use cases.
  # Uncomment and configure to enable.
  # security:
  #   enabled: true
  #   identityProviders:
  #     - name: google
  #       driver: google
  #       realm: google
  #       clientId: "{env.GOOGLE_CLIENT_ID}"
  #       clientSecret: "{env.GOOGLE_CLIENT_SECRET}"
  #       scopes: [openid, email, profile]
  #   portal:
  #     name: myportal
  #     tokenLifetime: 86400
  #     cryptoKey: "{env.JWT_SHARED_KEY}"
  #     enableProviders: [google]
  #     cookie:
  #       domain: example.com
  #   transforms:
  #     - match:
  #         realm: google
  #         email: admin@example.com
  #       action: add role authp/admin
  #     - match:
  #         realm: google
  #       action: add role authp/user
  #   policies:
  #     - name: users
  #       authUrl: /auth/oauth2/google
  #       allowRoles: [authp/admin, authp/user]
  #       injectHeaders: true
  #   credentialsSecret: caddy-security-creds

# ── High Availability ─────────────────────────────────────────────────────────

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ── Observability ─────────────────────────────────────────────────────────────

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s

tracing:
  enabled: false
  endpoint: otel-collector.monitoring.svc.cluster.local:4317

# ── Extra global Caddyfile options ────────────────────────────────────────────
# Uncomment to restrict TLS versions or override cipher suites.
# caddyfile:
#   extraGlobalOptions: |
#     servers {
#       protocols tls1.2 tls1.3
#     }
