# ── Full-featured example ─────────────────────────────────────────────────────
# All optional plugins enabled. Tune to your needs before deploying.
#
# Usage:
#   helm install caddy caddy-custom/caddy -n caddy --create-namespace -f full.yaml

k8sIngress:
  enabled: true
  ingressClass: caddy-custom
  isDefaultClass: false
  # Watch all namespaces (default). Set to specific namespace for multi-tenant.
  watchNamespace: ""
  security:
    waf: true
    wafMode: DetectionOnly   # switch to On once tuned
    securityHeaders: true
    injectRealIP: true

workloadType: DaemonSet
hostPorts:
  enabled: true
  http: 80
  https: 443

# ── TLS — choose one ──────────────────────────────────────────────────────────

# Option A: cert-manager CSI
# Caddy detects cert rotation via fsnotify — no restart needed.
tls:
  certManagerCSI:
    enabled: true
    issuerName: letsencrypt-prod
    issuerKind: ClusterIssuer

# ── Config hot-reload ─────────────────────────────────────────────────────────
# Built-in — no Stakater Reloader needed. Watches the Caddyfile ConfigMap and
# calls POST /load on Caddy's admin API when it changes. Zero pod restarts.

configReloader:
  enabled: true

# Option B: CertMagic built-in ACME with On-Demand TLS (no external dependencies)
# tls:
#   certManagerCSI:
#     enabled: false
#   acme:
#     enabled: true
#     email: admin@example.com
#     challenge: http          # http | tls-alpn | dns
#     storage: kubernetes      # no PVC needed
#     # On-Demand TLS — issue certs dynamically on first request
#     onDemand:
#       enabled: true
#       ask: "http://validator.internal/check"   # IMPORTANT for production
#       rateLimit:
#         burst: 5
#         interval: 2m
#     # For ZeroSSL, Sectigo, etc.
#     # eab:
#     #   keyId: "{env.ACME_EAB_KEY_ID}"
#     #   macKey: "{env.ACME_EAB_MAC_KEY}"

# ── Real IP ───────────────────────────────────────────────────────────────────

realIP:
  trustedProxies:
    - 10.42.0.0/16
    - 127.0.0.1/32
  strict: true
  injectXRealIP: true

# ── Security headers ──────────────────────────────────────────────────────────

securityHeaders:
  enabled: true
  hsts:
    enabled: true
    maxAge: 31536000
    includeSubDomains: true
    preload: false
  xContentTypeOptions: true
  xFrameOptions: SAMEORIGIN
  referrerPolicy: strict-origin-when-cross-origin
  removeServerHeader: true

# ── Plugins ───────────────────────────────────────────────────────────────────

plugins:
  coraza:
    enabled: true
    ruleEngine: DetectionOnly   # switch to On once tuned

  crowdsec:
    enabled: true
    lapiUrl: http://crowdsec-lapi.crowdsec.svc.cluster.local:8080
    existingSecret: crowdsec-bouncer-secret   # key: api-key
    tickerInterval: 15s

  rateLimit:
    enabled: true
    window: 1m
    maxEvents: 200
    key: "{client_ip}"

  geoip:
    enabled: true
    dbPath: /data/geoip/GeoLite2-Country.mmdb
    deniedCountries: []   # e.g. ["CN", "RU", "KP", "IR"]
    updater:
      enabled: true
      existingSecret: maxmind-secret   # keys: account-id, license-key

  defender:
    enabled: true
    action: block   # block | tarpit | garbage

  # ── Built-in Authentication (caddy-security) ────────────────────────────────
  # Replaces Authelia/OAuth2-proxy for simple SSO use cases.
  # Uncomment and configure to enable.
  # security:
  #   enabled: true
  #   identityProviders:
  #     - name: google
  #       driver: google
  #       realm: google
  #       clientId: "{env.GOOGLE_CLIENT_ID}"
  #       clientSecret: "{env.GOOGLE_CLIENT_SECRET}"
  #       scopes: [openid, email, profile]
  #   portal:
  #     name: myportal
  #     tokenLifetime: 86400
  #     cryptoKey: "{env.JWT_SHARED_KEY}"
  #     enableProviders: [google]
  #     cookie:
  #       domain: example.com
  #   transforms:
  #     - match:
  #         realm: google
  #         email: admin@example.com
  #       action: add role authp/admin
  #     - match:
  #         realm: google
  #       action: add role authp/user
  #   policies:
  #     - name: users
  #       authUrl: /auth/oauth2/google
  #       allowRoles: [authp/admin, authp/user]
  #       injectHeaders: true
  #   credentialsSecret: caddy-security-creds

# ── High Availability ─────────────────────────────────────────────────────────

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ── Observability ─────────────────────────────────────────────────────────────

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s

tracing:
  enabled: false
  endpoint: otel-collector.monitoring.svc.cluster.local:4317

# ── Extra global Caddyfile options ────────────────────────────────────────────
# Uncomment to restrict TLS versions or override cipher suites.
# caddyfile:
#   extraGlobalOptions: |
#     servers {
#       protocols tls1.2 tls1.3
#     }
