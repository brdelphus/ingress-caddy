# ── ZeroSSL with External Account Binding (EAB) ───────────────────────────────
# Use ZeroSSL as your ACME CA instead of Let's Encrypt.
# ZeroSSL offers 90-day certs with no rate limits and REST API access.
#
# Two ways to use ZeroSSL:
#
# A) Global default (this file) — all certmagic Ingresses use ZeroSSL.
#    Set tls.acme.ca here; EAB creds go in a Secret in the caddy namespace.
#
# B) Per-Ingress annotation — use ZeroSSL for specific Ingresses only while
#    others use the global default CA. EAB Secret lives in the Ingress namespace:
#
#    kubectl create secret generic acme-eab-creds \
#      --from-literal=key_id=your-key-id \
#      --from-literal=mac_key=your-mac-key \
#      -n myapp
#
#    annotations:
#      caddy.ingress/tls: certmagic
#      caddy.ingress/tls-ca: "https://acme.zerossl.com/v2/DV90"
#      caddy.ingress/tls-ca-secret: acme-eab-creds
#
# Ingresses must have spec.tls to be routed to the HTTPS server (port 443).
# Leave secretName empty — CertMagic issues the cert via ZeroSSL on first use.
#
# Usage (global):
#   helm install caddy caddy-custom/caddy -n caddy --create-namespace \
#     -f examples/caddy/baremetal.yaml \
#     -f examples/caddy/zerossl.yaml
#
# Prerequisites for global mode:
#   1. Create ZeroSSL account: https://app.zerossl.com/signup
#   2. Generate EAB credentials: https://app.zerossl.com/developer
#   3. Create K8s secret in the caddy namespace:
#      kubectl create secret generic acme-eab-creds \
#        --from-literal=ACME_EAB_KEY_ID=your-key-id \
#        --from-literal=ACME_EAB_MAC_KEY=your-mac-key \
#        -n caddy
#
# Also works with:
#   - Sectigo: https://www.sectigo.com/
#   - Google Trust Services: https://pki.goog/
#   - DigiCert: https://www.digicert.com/
#   - Any CA supporting ACME with EAB

tls:
  acme:
    enabled: true
    email: admin@example.com
    ca: "https://acme.zerossl.com/v2/DV90"
    challenge: http    # or dns for wildcards
    storage: kubernetes
    eab:
      keyId: "{env.ACME_EAB_KEY_ID}"
      macKey: "{env.ACME_EAB_MAC_KEY}"

extraEnv:
  - name: ACME_EAB_KEY_ID
    valueFrom:
      secretKeyRef:
        name: acme-eab-creds
        key: ACME_EAB_KEY_ID
  - name: ACME_EAB_MAC_KEY
    valueFrom:
      secretKeyRef:
        name: acme-eab-creds
        key: ACME_EAB_MAC_KEY

# ── Ingress example ───────────────────────────────────────────────────────────
# spec.tls is required for HTTPS. caddy.ingress/tls: certmagic tells caddy-k8s
# that CertMagic owns the cert — ZeroSSL issues it via ACME.
#
# ---
# apiVersion: networking.k8s.io/v1
# kind: Ingress
# metadata:
#   name: myapp
#   namespace: myapp
#   annotations:
#     caddy.ingress/tls: certmagic
# spec:
#   ingressClassName: caddy-custom
#   tls:
#     - hosts:
#         - app.example.com
#   rules:
#     - host: app.example.com
#       http:
#         paths:
#           - path: /
#             pathType: Prefix
#             backend:
#               service:
#                 name: myapp
#                 port:
#                   number: 8080

# ── Alternative CAs ───────────────────────────────────────────────────────────
#
# Google Trust Services:
#   ca: "https://dv.acme-v02.api.pki.goog/directory"
#
# Buypass (no EAB needed):
#   ca: "https://api.buypass.com/acme/directory"
#
# SSL.com:
#   ca: "https://acme.ssl.com/sslcom-dv-rsa"
