apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "caddy.fullname" . }}-routes
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "caddy.labels" . | nindent 4 }}
  annotations:
    # Edit this ConfigMap directly to add/update routes without a helm upgrade.
    # Stakater Reloader will trigger a rolling restart automatically when changed.
data:
  # Each .caddy file here is imported by the main Caddyfile.
  # Use `import security`       → enables WAF, rate limit, GeoIP, headers, auth
  # Use `import upstream <svc>` → reverse proxy with X-Real-IP injection
  #
  # Example — Ghost blog:
  #
  # blog.caddy: |
  #   blog.delphus.org {
  #     tls {{ include "caddy.tlsCertPath" . }} {{ include "caddy.tlsKeyPath" . }}
  #     import security
  #     import upstream ghost.blog.svc.cluster.local:2368
  #   }
  #
  # Example — Nextcloud (with .well-known and DAV headers):
  #
  # nextcloud.caddy: |
  #   dav.delphus.org {
  #     tls {{ include "caddy.tlsCertPath" . }} {{ include "caddy.tlsKeyPath" . }}
  #     import security
  #     redir /.well-known/carddav /remote.php/dav 301
  #     redir /.well-known/caldav  /remote.php/dav 301
  #     header Strict-Transport-Security "max-age=31536000"
  #     reverse_proxy nextcloud.nextcloud.svc.cluster.local:80 {
  #       header_up X-Real-IP {client_ip}
  #       header_up X-Forwarded-For {client_ip}
  #       header_up X-Forwarded-Proto https
  #     }
  #   }
  #
  # Example — Mailu webmail/admin (HTTP only, real-IP for nginx backend):
  #
  # mailu.caddy: |
  #   mail.delphus.org {
  #     tls {{ include "caddy.tlsCertPath" . }} {{ include "caddy.tlsKeyPath" . }}
  #     import security
  #     import upstream mailu-front.mail.svc.cluster.local:80
  #   }
  #
  # Example — Grafana:
  #
  # grafana.caddy: |
  #   graphadm.delphus.org {
  #     tls {{ include "caddy.tlsCertPath" . }} {{ include "caddy.tlsKeyPath" . }}
  #     import security
  #     import upstream grafana.monitoring.svc.cluster.local:3000
  #   }
  #
  # Example — AzuraCast (web UI only; streaming TCP handled by L4 in values.yaml):
  #
  # azuracast.caddy: |
  #   cast.delphus.org {
  #     tls {{ include "caddy.tlsCertPath" . }} {{ include "caddy.tlsKeyPath" . }}
  #     import security
  #     import upstream azuracast.azuracast.svc.cluster.local:80
  #   }

  # Placeholder so the import glob always finds at least one file
  .gitkeep: ""
