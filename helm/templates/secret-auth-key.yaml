{{- if .Values.plugins.security.enabled }}
{{- if not .Values.plugins.security.credentialsSecret }}
{{- $secretName := printf "%s-auth-key" (include "caddy.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $key := randAlphaNum 64 }}
{{- if $existing }}
  {{- $key = index $existing.data "JWT_SHARED_KEY" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "caddy.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  JWT_SHARED_KEY: {{ $key | b64enc }}
{{- end }}
{{- end }}
