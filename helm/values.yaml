## Caddy — custom k3s ingress with WAF, TCP/UDP, cert-manager, CrowdSec, GeoIP
## arm64-native, all plugins toggleable

nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/brdelphus/ingress-caddy
  tag: "1.0.16"
  pullPolicy: IfNotPresent

# Image pull secrets for private registries.
# Example: imagePullSecrets: [{name: my-registry-secret}]
imagePullSecrets: []

# ── Plugin toggles ─────────────────────────────────────────────────────────────

plugins:

  # OWASP Core Rule Set WAF via Coraza (corazawaf/coraza-caddy)
  coraza:
    enabled: true
    # DetectionOnly = log only, no blocking — start here, switch to On when tuned
    ruleEngine: DetectionOnly   # DetectionOnly | On | Off
    # Additional SecLang rules appended after CRS
    customRules: []
    # - "SecRule REQUEST_URI \"@contains /wp-admin\" \"id:9001,phase:1,deny,status:403,msg:'WordPress admin blocked'\""

  # CrowdSec IP reputation + optional AppSec WAF (hslatman/caddy-crowdsec-bouncer)
  # Requires CrowdSec agent DaemonSet running in the cluster
  crowdsec:
    enabled: false
    lapiUrl: http://crowdsec-lapi.crowdsec.svc.cluster.local:8080
    # Provide apiKey directly or via existingSecret (key: api-key)
    apiKey: ""
    existingSecret: ""
    tickerInterval: 15s
    appSec:
      enabled: false
      host: crowdsec-lapi.crowdsec.svc.cluster.local
      port: 7422

  # Sliding-window rate limiting (mholt/caddy-ratelimit)
  rateLimit:
    enabled: false
    window: 1m
    maxEvents: 100
    # Caddy placeholder for the rate limit key — {client_ip} after trusted_proxies
    key: "{client_ip}"

  # RFC 7234 HTTP response cache (caddyserver/cache-handler / Souin)
  cache:
    enabled: false
    ttl: 1h
    # memory = in-process, redis = distributed (needed for multi-node DaemonSet)
    backend: memory
    redis:
      address: ""               # e.g. redis.redis.svc.cluster.local:6379

  # MaxMind GeoIP country-level blocking (porech/caddy-maxmind-geolocation)
  geoip:
    enabled: false
    dbPath: /data/geoip/GeoLite2-Country.mmdb
    # ISO 3166-1 alpha-2 country codes to block
    deniedCountries: []         # ["CN", "RU", "KP", "IR"]
    # Init container to download/refresh the MaxMind database
    updater:
      enabled: false
      # Provide credentials directly or via existingSecret (keys: account-id, license-key)
      accountId: ""
      licenseKey: ""
      existingSecret: ""

  # AI scraper / cloud datacenter IP blocker (JasonLovesDoggo/caddy-defender)
  defender:
    enabled: false
    action: block               # block | tarpit | garbage

  # Authentication, Authorization, and Accounting (greenpau/caddy-security)
  # Implements OAuth2, OIDC, SAML, LDAP, local auth with MFA support.
  # Docs: https://docs.authcrunch.com
  security:
    enabled: false

    # ── Identity Providers ────────────────────────────────────────────────────────
    # Configure one or more OAuth2/OIDC identity providers.
    # Each provider needs: name, driver, client_id, client_secret, scopes
    identityProviders: []
    # - name: google
    #   driver: google
    #   realm: google
    #   clientId: ""                    # or use {env.GOOGLE_CLIENT_ID}
    #   clientSecret: ""                # or use {env.GOOGLE_CLIENT_SECRET}
    #   scopes:
    #     - openid
    #     - email
    #     - profile
    #
    # - name: github
    #   driver: github
    #   realm: github
    #   clientId: ""
    #   clientSecret: ""
    #   scopes:
    #     - user
    #
    # - name: generic                   # Generic OIDC (Keycloak, Authentik, etc.)
    #   driver: generic
    #   realm: generic
    #   clientId: ""
    #   clientSecret: ""
    #   scopes:
    #     - openid
    #     - email
    #     - profile
    #   # Required for generic OIDC:
    #   metadataUrl: ""                 # https://keycloak.example.com/realms/master/.well-known/openid-configuration
    #   # Or specify endpoints manually:
    #   # baseAuthUrl: ""
    #   # tokenUrl: ""
    #   # userInfoUrl: ""

    # ── Authentication Portal ─────────────────────────────────────────────────────
    # The portal handles login UI and token issuance.
    portal:
      name: myportal
      # Token lifetime in seconds (default: 24 hours)
      tokenLifetime: 86400
      # Cookie settings
      cookie:
        domain: ""                      # e.g. example.com (for cross-subdomain SSO)
        insecure: false                 # set true only for local dev (HTTP)
        sameSite: lax                   # strict | lax | none
      # Crypto key for signing tokens — MUST be set in production
      # Use {env.JWT_SHARED_KEY} to reference from secret
      cryptoKey: ""
      # Which identity providers to enable in the portal
      enableProviders: []               # e.g. ["google", "github", "generic"]

    # ── User Transforms ───────────────────────────────────────────────────────────
    # Map users from identity providers to roles.
    # By default, users get "authp/guest" role unless transformed.
    transforms: []
    # - match:
    #     realm: google
    #     email: admin@example.com
    #   action: add role authp/admin
    #
    # - match:
    #     realm: google
    #   action: add role authp/user
    #
    # - match:
    #     realm: github
    #     org: myorg
    #   action: add role authp/user

    # ── Authorization Policies ────────────────────────────────────────────────────
    # Define policies that can be applied to routes.
    policies: []
    # - name: admins-only
    #   authUrl: /auth/oauth2/google    # redirect unauthorized users here
    #   allowRoles:
    #     - authp/admin
    #   injectHeaders: true             # inject user claims as headers
    #   validateBearer: false           # validate Authorization: Bearer tokens
    #
    # - name: users
    #   authUrl: /auth/oauth2/google
    #   allowRoles:
    #     - authp/admin
    #     - authp/user
    #   injectHeaders: true

    # ── Secrets ───────────────────────────────────────────────────────────────────
    # Reference a K8s secret containing OAuth credentials as env vars.
    # Keys in the secret become available as {env.KEY_NAME} in the config.
    # Example secret keys: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, JWT_SHARED_KEY
    credentialsSecret: ""

# ── TCP/UDP Layer 4 routing (mholt/caddy-l4) ──────────────────────────────────

l4:
  enabled: true

  # Declare which L4 ports should be bound as hostPorts on the DaemonSet node.
  # Each port+protocol must be listed here AND in routes below.
  # DNS needs both TCP and UDP on port 53 — list them as separate entries.
  hostPorts: []
  # - port: 53
  #   protocol: UDP
  # - port: 53
  #   protocol: TCP
  # - port: 8000
  #   protocol: TCP
  # - port: 8005
  #   protocol: TCP

  # L4 routes templated into the Caddyfile global block.
  # proxyProtocol: v2 → sends PROXY protocol v2 to the backend so it can
  # recover the real client IP (needed for Postfix, Dovecot, HAProxy backends).
  # UDP listeners require the "udp/" prefix on the address (e.g. "udp/:53").
  # TCP listeners use a plain address (e.g. ":8000"). Without the prefix,
  # caddy-l4 defaults to TCP even if the upstream dial is udp/.
  routes: []
  # - address: "udp/:53"
  #   upstream: "udp/kube-dns.kube-system.svc.cluster.local:53"
  # - address: ":53"
  #   upstream: "tcp/kube-dns.kube-system.svc.cluster.local:53"
  # - address: ":8000"
  #   upstream: "tcp/azuracast.azuracast.svc.cluster.local:8000"
  # - address: ":8005"
  #   upstream: "tcp/azuracast.azuracast.svc.cluster.local:8005"
  # - address: ":25"
  #   upstream: "tcp/mailu-front.mail.svc.cluster.local:25"
  #   proxyProtocol: v2
  # - address: ":465"
  #   upstream: "tcp/mailu-front.mail.svc.cluster.local:465"
  #   proxyProtocol: v2
  # - address: ":993"
  #   upstream: "tcp/mailu-front.mail.svc.cluster.local:993"
  #   proxyProtocol: v2

# ── TLS ────────────────────────────────────────────────────────────────────────
# Three mutually exclusive backends — enable exactly one.

tls:
  # ── Option 1: cert-manager CSI driver ────────────────────────────────────────
  # External dependency — requires cert-manager + cert-manager-csi-driver.
  # Certificates are mounted as real files; Caddy's fsnotify handles rotation.
  certManagerCSI:
    enabled: true
    issuerName: letsencrypt-prod
    issuerKind: ClusterIssuer
    dnsNames: []
    certFile: tls.crt
    keyFile: tls.key

  # ── Option 2: CertMagic built-in ACME ────────────────────────────────────────
  # No external dependency — Caddy handles issuance and renewal automatically.
  # Domains are discovered from Ingress resources as apps are deployed.
  #
  # Challenge types:
  #   http     — HTTP-01 on port 80. Default; no extra config needed.
  #   tls-alpn — TLS-ALPN-01 on port 443. No extra config needed.
  #   dns      — DNS-01 via a provider module. Required for wildcard certs or
  #              private clusters. Build the image with DNS_PROVIDER build arg.
  #              See https://github.com/caddy-dns for available providers.
  #
  # Storage backends (where CertMagic saves issued certificates):
  #   filesystem  — /data/caddy/ inside the pod. Requires persistence (PVC or
  #                 hostPath) to survive restarts and avoid rate limit issues.
  #   kubernetes  — Kubernetes Secrets in the release namespace. No PVC needed;
  #                 certs survive restarts naturally. Needs extra RBAC (auto-added).
  #   redis       — Redis key-value store. Uses bundled Redis when redis.enabled.
  #                 Best for multi-replica Deployments needing shared cert state.
  acme:
    enabled: false
    email: ""
    # ACME CA directory URL. Leave empty for Let's Encrypt production.
    # Staging: https://acme-staging-v02.api.letsencrypt.org/directory
    ca: ""
    # Challenge type: http | tls-alpn | dns
    challenge: http
    # Storage backend: filesystem | kubernetes | redis
    storage: filesystem

    # ── On-Demand TLS ───────────────────────────────────────────────────────────
    # Issue certificates dynamically on first request. No need to pre-list domains
    # or use wildcards. Caddy obtains a cert when a client connects.
    # WARNING: Enable 'ask' URL in production to prevent abuse!
    onDemand:
      enabled: false
      # URL to query before issuing a cert. Must return 200 OK to allow.
      # Example: http://validator.internal/check?domain={host}
      # If empty, on-demand TLS is unrestricted (dangerous in production).
      ask: ""
      # Rate limits for on-demand certificate issuance
      rateLimit:
        # Max certificates to issue in the interval
        burst: 5
        # Time window for rate limiting (e.g. 1m, 1h)
        interval: 2m

    # ── External Account Binding (EAB) ──────────────────────────────────────────
    # Required for some ACME CAs: ZeroSSL, Sectigo, Google Trust Services, etc.
    # Get credentials from your CA's dashboard.
    eab:
      keyId: ""                       # e.g. "abc123" or {env.ACME_EAB_KEY_ID}
      macKey: ""                      # e.g. "secret" or {env.ACME_EAB_MAC_KEY}

    # ── OCSP Stapling ───────────────────────────────────────────────────────────
    # How often to check OCSP responders for certificate revocation status.
    # Default: 1h. Set to 0 to disable OCSP stapling checks.
    ocspCheckInterval: ""             # e.g. "1h", "30m"

    # ── DNS-01 config — only used when challenge: dns ───────────────────────────
    dns:
      # Provider name as registered in the Caddy module (e.g. cloudflare, rfc2136)
      provider: ""
      # Raw Caddyfile config block. Use {env.VAR_NAME} to reference credentials.
      # Example (Cloudflare):   api_token {env.CF_API_TOKEN}
      # Example (RFC 2136):     key_name my-key
      #                         key_alg  hmac-sha256
      #                         key_secret {env.TSIG_SECRET}
      #                         nameservers dns.example.com:53
      config: ""
      # All keys in this secret are exposed as env vars to Caddy.
      credentialsSecret: ""

  # ── Option 3: existing TLS secret ────────────────────────────────────────────
  existingSecret: ""

  # Mount path inside the container (certManagerCSI and existingSecret only)
  mountPath: /certs

# ── Persistence ────────────────────────────────────────────────────────────────
# Only needed when tls.acme.enabled and tls.acme.storage: filesystem.
# kubernetes and redis storage handle persistence themselves.
#
# For DaemonSet:   hostPath (one dir per node, simple)
# For Deployment:  storageClass PVC
persistence:
  enabled: false
  hostPath: ""         # e.g. /var/lib/caddy — recommended for DaemonSet
  storageClass: ""     # for Deployment mode with dynamic provisioning
  size: 1Gi
  accessMode: ReadWriteOnce

# ── Real IP / trusted proxies ──────────────────────────────────────────────────

realIP:
  enabled: true
  # CIDRs of upstream hops Caddy should trust for X-Forwarded-For
  # k3s default pod CIDR is 10.42.0.0/16
  trustedProxies:
    - 10.42.0.0/16
    - 127.0.0.1/32
  # Right-to-left XFF parsing — more secure, prevents IP spoofing
  strict: true
  # Inject X-Real-IP and X-Forwarded-* upstream — required by Mailu's nginx
  # and other nginx-based backends that rely on these headers for real client IP
  injectXRealIP: true

# ── Security headers ───────────────────────────────────────────────────────────

securityHeaders:
  enabled: true
  hsts:
    enabled: true
    maxAge: 31536000
    includeSubDomains: true
    preload: false
  xContentTypeOptions: true
  xFrameOptions: SAMEORIGIN    # SAMEORIGIN | DENY | "" (empty = omit)
  referrerPolicy: strict-origin-when-cross-origin
  permissionsPolicy: "geolocation=(), microphone=(), camera=()"
  removeServerHeader: true

# ── Forward auth ───────────────────────────────────────────────────────────────
# Delegates auth to Authelia / authentik / oauth2-proxy via Caddy's built-in
# forward_auth directive. Add `import security` to your route files to enable.

forwardAuth:
  enabled: false
  url: http://authelia.authelia.svc.cluster.local:9091
  uri: /api/authz/forward-auth
  copyHeaders:
    - Remote-User
    - Remote-Groups
    - Remote-Email
    - Remote-Name

# ── Observability ──────────────────────────────────────────────────────────────

metrics:
  enabled: true
  port: 2019                    # Caddy admin API also serves /metrics here

  serviceMonitor:               # Prometheus Operator ServiceMonitor
    enabled: false
    namespace: monitoring
    interval: 30s
    labels: {}

tracing:
  enabled: false
  # OTLP gRPC endpoint — send to your OTel collector (Tempo, Jaeger, etc.)
  endpoint: otel-collector.monitoring.svc.cluster.local:4317
  spanName: caddy

# ── Extra global Caddyfile options ─────────────────────────────────────────────
# Raw Caddyfile text injected verbatim into the global options block { }.
# Use this to configure anything Caddy supports globally that the chart does not
# expose as a structured value — cipher suites, TLS versions, curves, etc.
#
# Example — restrict to TLS 1.3 only with explicit cipher list:
#
#   caddyfile:
#     extraGlobalOptions: |
#       servers {
#         listener_wrappers {
#           tls
#         }
#       }
#
# Example — set cipher suites via Caddy's JSON snippet (most flexible):
#
#   caddyfile:
#     extraGlobalOptions: |
#       servers {
#         default_sni example.com
#       }
#
# See https://caddyserver.com/docs/caddyfile/options for all supported options.
caddyfile:
  extraGlobalOptions: ""

# ── Admin API ──────────────────────────────────────────────────────────────────

admin:
  # Bind to all interfaces so kubelet liveness/readiness probes can reach the
  # admin API when using hostPorts (not hostNetwork). The metrics ClusterIP
  # service gates external access; pod network is already cluster-internal.
  host: ""
  port: 2019

# ── LoadBalancer service ───────────────────────────────────────────────────────
# Creates a Service that fronts the DaemonSet. Use this with MetalLB, cloud LBs
# (AWS NLB, GCE, etc.), or any cluster that has a LoadBalancer provider.
# For bare-metal k3s without a LB, leave disabled and use hostPorts below.
#
# externalTrafficPolicy: Local is strongly recommended — it preserves the real
# client IP without requiring trusted_proxies adjustments, and avoids an extra
# hop through kube-proxy on a different node.
#
# L4 ports (l4.hostPorts) are automatically included in the Service so you only
# need to declare them once.

service:
  enabled: false
  type: LoadBalancer
  # Request a specific IP from your LB provider (MetalLB pool IP, Elastic IP, etc.)
  loadBalancerIP: ""
  # Local = real client IP preserved + LB only routes to nodes running a pod
  # Cluster = client IP is lost (replaced by node IP) but traffic is spread across all nodes
  externalTrafficPolicy: Local

  # ── IP Dual Stack ─────────────────────────────────────────────────────────────
  # Enable IPv4 + IPv6 dual-stack support (requires K8s 1.23+ with dual-stack enabled)
  ipDualStack:
    enabled: false
    # IP families to use: IPv4, IPv6, or both
    ipFamilies: []              # e.g. ["IPv4", "IPv6"]
    # Policy: SingleStack, PreferDualStack, or RequireDualStack
    ipFamilyPolicy: ""          # e.g. "PreferDualStack"

  labels: {}

  annotations: {}
    # MetalLB address pool:
    # metallb.universe.tf/address-pool: production
    #
    # AWS Network Load Balancer:
    # service.beta.kubernetes.io/aws-load-balancer-type: nlb
    #
    # GCE internal LB:
    # cloud.google.com/load-balancer-type: Internal

# ── Workload type ─────────────────────────────────────────────────────────────
# DaemonSet  — runs on every node; use with hostPorts for bare-metal k3s.
# Deployment — fixed replica count; use with service.type: LoadBalancer (MetalLB,
#              cloud LBs). Set hostPorts.enabled: false when using a LoadBalancer
#              so pods don't compete for node ports.

workloadType: DaemonSet   # DaemonSet | Deployment
replicaCount: 2           # only used when workloadType: Deployment

# ── DaemonSet / pod settings ───────────────────────────────────────────────────
# hostPorts bind directly on each node's network interface.
# Can coexist with the LoadBalancer service — disable if your LB provider
# conflicts with hostPort binding (rare).

hostPorts:
  enabled: true
  http: 80
  https: 443

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Tolerate control-plane nodes so Caddy runs on all nodes
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule

nodeSelector: {}

# Pod affinity / anti-affinity rules.
# Example — spread pods across nodes (recommended for Deployment mode):
#   affinity:
#     podAntiAffinity:
#       preferredDuringSchedulingIgnoredDuringExecution:
#         - weight: 100
#           podAffinityTerm:
#             topologyKey: kubernetes.io/hostname
#             labelSelector:
#               matchLabels:
#                 app.kubernetes.io/name: caddy
affinity: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# Pod-level security context applied to the entire pod spec.
# Example: {fsGroup: 1000}
podSecurityContext: {}

# Container-level security context for the Caddy container.
# NET_BIND_SERVICE is required to bind ports 80 and 443 as non-root.
# Remove it and set runAsUser: 65534 (nobody) once you switch to hostPorts
# forwarded by a privileged DaemonSet or use a LoadBalancer on high ports.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
    add: ["NET_BIND_SERVICE"]
  runAsUser: 0
  runAsGroup: 0

podAnnotations: {}

# ── Pod Disruption Budget ────────────────────────────────────────────────────────
# Ensures a minimum number of pods remain available during voluntary disruptions
# (node drains, cluster upgrades, etc.). Recommended for production.
podDisruptionBudget:
  enabled: false
  # Minimum pods that must remain available (absolute number or percentage)
  minAvailable: 1
  # Maximum pods that can be unavailable (alternative to minAvailable)
  # maxUnavailable: 1

# ── Built-in config reloader ────────────────────────────────────────────────────
# The k8s_config_reloader Caddy module watches the Caddyfile ConfigMap and calls
# POST /load on Caddy's admin API when it changes — hot reload, no pod restart.
# This replaces Stakater Reloader entirely for Caddyfile config changes.
configReloader:
  enabled: true
  # configmap: ""   # defaults to <release>-caddyfile
  # key: Caddyfile  # key inside ConfigMap.data
  # adminAPI: ""    # defaults to localhost:2019

# Stakater Reloader — kept for backwards compatibility, disabled when configReloader is on.
# Install: helm install reloader stakater/reloader -n kube-system
reloader:
  enabled: false

# ── Kubernetes Ingress controller ─────────────────────────────────────────────
# Watches Ingress resources with ingressClassName: caddy and dynamically
# inserts routes into Caddy via the admin API. No more manual Caddyfile editing
# for HTTP services — just set ingressClassName: caddy in your charts.

k8sIngress:
  # IngressClass name — must match spec.ingressClassName in your Ingress resources
  ingressClass: caddy
  # Set true to make this the cluster-wide default IngressClass
  isDefaultClass: false

  # ── Caddy server names ──────────────────────────────────────────────────────────
  # k8s_ingress resolves the Caddy server names for :443 and :80 by querying
  # GET /config/apps/http/servers at startup. This call deadlocks because Start()
  # is invoked while Caddy holds the config write-lock. Setting these explicitly
  # bypasses the admin API lookup entirely.
  # Caddy assigns names in Caddyfile order; with the default placeholder blocks
  # (:80, :443) auto-HTTPS processing yields srv0=:443, srv1=:80.
  serverName: "srv0"
  httpServerName: "srv1"

  # ── Namespace filtering ─────────────────────────────────────────────────────────
  # Watch Ingress resources only in specific namespace(s).
  # Empty string = watch all namespaces (default).
  # Useful for multi-tenant clusters or when running multiple Caddy instances.
  watchNamespace: ""

  # Security middleware injected into every Ingress-generated route
  security:
    # WAF via Coraza (requires coraza-caddy in the build, which we have)
    waf: false
    # DetectionOnly = log only, On = block
    wafMode: Detection
    # HSTS, X-Content-Type-Options, X-Frame-Options, Referrer-Policy, remove Server
    securityHeaders: true
    # Inject X-Real-IP + X-Forwarded-* to upstream — required by Mailu / nginx backends
    injectRealIP: true

  # ── Access logging ───────────────────────────────────────────────────────────────
  # When enabled, Caddy writes one JSON access log line per request to stderr.
  # Individual Ingresses can suppress logging via caddy.ingress/access-log: "false".
  accessLog: false

# ── Bundled Redis (optional) ───────────────────────────────────────────────────
# When enabled, deploys a Redis pod alongside Caddy using the Bitnami Redis
# sub-chart. caddy-k8s will automatically use it to persist the Ingress →
# route ID mapping across Caddy restarts, preventing stale route accumulation.
#
# To use an external Redis instead, leave redis.enabled: false and set
# k8sIngress.redis.address manually in the Caddyfile or via extraConfig.
#
# Full Bitnami Redis values reference:
#   https://github.com/bitnami/charts/tree/main/bitnami/redis

redis:
  enabled: false

  # Standalone is sufficient for single-node or DaemonSet deployments.
  # Use replication if you need HA with multiple Caddy replicas.
  architecture: standalone

  auth:
    enabled: false   # set to true and provide password for production
    # password: ""
    # existingSecret: ""

  master:
    persistence:
      enabled: false   # set to true to survive pod restarts
      size: 1Gi

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

extraEnv: []
extraVolumes: []
extraVolumeMounts: []
